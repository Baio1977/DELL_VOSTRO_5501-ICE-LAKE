name: Zip and Upload Artifact

on: 
  push:
    branches:
      - main  # You can specify the branch you want to trigger the action

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Zip EFI
      run: |
        rm -Rf TOOLS
        rm -Rf "Debug Bios V 1.25.0"
        rm -Rf Screenshot
        rm -Rf "TOOLS EFI MOD"
        rm -Rf .gitignore
        rm -Rf Dell Vostro 5501.ioreg
        rm -Rf README.md
        rm -Rf opencore-2023-11-07-192719.txt
        rm -Rf ".github"
        rm -Rf ".git"
        
        zip -r DellVostro5501.zip .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DellVostro5501
        path: DellVostro5501.zip
